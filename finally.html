<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 禁止手机端缩放，防止布局错乱 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星海花落 · 生日祝福</title>
    <style>
        /* 全屏宇宙背景 */
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: linear-gradient(0deg, #0c0c2a 0%, #000 70%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        
        /* 星光背景层 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            opacity: 0.8;
            pointer-events: none;
            z-index: 1;
        }
        
        /* 文字层 */
        .final-text {
            position: relative;
            z-index: 10;
            color: #e0f7fa;
            text-shadow: 0 0 15px #4fc3f7, 0 0 30px #03a9f4;
            padding: 20px;
            text-align: center;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(1.02); }
        }
        
        .final-text h1 {
            font-size: 4.5rem;
            font-weight: 700;
            margin: 20px 0;
            letter-spacing: 5px;
            background: linear-gradient(to right, #84ffff, #18ffff, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .final-text p {
            font-size: 2rem;
            font-style: italic;
            color: #b3e5fc;
            margin-top: 25px;
        }

        /* --- 手机端适配 --- */
        @media (max-width: 768px) {
            .final-text h1 {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }
            .final-text p {
                font-size: 1.2rem;
                margin-top: 15px;
            }
        }
        
        /* 银河光带 */
        .galaxy {
            position: absolute;
            height: 120px;
            width: 100%;
            background: linear-gradient(90deg, transparent, rgba(3, 169, 244, 0.1), rgba(132, 255, 255, 0.05), rgba(3, 169, 244, 0.1), transparent);
            filter: blur(20px);
            opacity: 0.4;
            animation: drift 15s infinite linear alternate;
        }

        @keyframes drift {
            0% { transform: translateX(-5%); }
            100% { transform: translateX(5%); }
        }

        /* 音乐播放按钮样式 */
        #music-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(3, 169, 244, 0.8);
            color: #fff;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(79, 195, 247, 0.6);
            transition: all 0.3s ease;
            outline: none; /* 去除手机点击时的外边框 */
            -webkit-tap-highlight-color: transparent; /* 去除移动端点击高亮 */
        }
        #music-btn:active {
            background: rgba(0, 229, 255, 0.9);
            transform: translateX(-50%) scale(0.95);
        }
    </style>
</head>
<body>
    <!-- 银河光带 -->
    <div class="galaxy" style="top: 25%;"></div>
    <div class="galaxy" style="top: 65%; transform: rotate(180deg);"></div>
    
    <!-- 隐藏的音频标签（记得检查 src 里的文件名是否和你的录音一致） -->
    <audio id="bg-music" src="brithday.mp3" loop preload="auto"></audio>
    
    <!-- 文字层 -->
    <div class="final-text">
        <h1>祝你生日快乐！</h1>
        <p>最后感谢你的观看 🌹🌹</p>
    </div>

    <!-- 播放按钮 -->
    <button id="music-btn">神秘彩蛋🥚</button>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const musicBtn = document.getElementById('music-btn');
            const bgMusic = document.getElementById('bg-music');
            let isPlaying = false;

            // 统一处理点击和触摸事件
            function toggleMusic(e) {
                e.preventDefault();
                if (isPlaying) {
                    bgMusic.pause();
                    musicBtn.textContent = '神秘彩蛋🥚';
                } else {
                    // play() 返回 Promise，使用 catch 防止浏览器拦截报错
                    bgMusic.play().then(() => {
                        musicBtn.textContent = '⏸️ 暂停播放';
                    }).catch(error => {
                        console.log("播放被阻止:", error);
                        musicBtn.textContent = '🔊 点击重试';
                    });
                }
                isPlaying = !isPlaying;
            }

            musicBtn.addEventListener('click', toggleMusic);
            musicBtn.addEventListener('touchstart', toggleMusic, { passive: false });
        });
    </script>
</body>
</html>
