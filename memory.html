<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拆礼物啦！</title>
    <!-- 引入 Bootstrap 样式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fff0f5, #fce4ec);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .game-container {
            text-align: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .gift-box {
            width: 85px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            border-radius: 15px;
            background: linear-gradient(45deg, #ff9a9e, #fecfef);
            box-shadow: 0 8px 15px rgba(255, 107, 146, 0.3);
            border: 3px solid #fff;
            position: relative;
            overflow: hidden;
            user-select: none;
        }

        .gift-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background-color: #fff;
        }

        .gift-box:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 20px rgba(255, 107, 146, 0.4);
        }

        .gift-box.opened {
            cursor: default;
            background: linear-gradient(45deg, #a8edea, #fed6e3);
            transform: rotate(0);
        }

        @media (min-width: 768px) {
            .gift-box {
                width: 100px;
                height: 100px;
                font-size: 18px;
                margin: 15px;
            }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-2deg); }
            20% { transform: translate(-2px, 0px) rotate(2deg); }
            30% { transform: translate(2px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-2px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake-anim {
            animation: shake 0.4s;
        }

        #victory-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            text-align: center;
            padding: 20px;
        }

        .btn-custom {
            background-color: #d63384;
            border: none;
            padding: 10px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            transition: background-color 0.3s;
        }

        .btn-custom:hover {
            background-color: #c6287e;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h2 class="mb-3 text-danger fw-bold">🎁 送你五千万！</h2>
        <p class="text-muted mb-4">请连续拆开 <span id="target-count" class="fw-bold text-primary">5</span> 个礼盒，凑齐五千万！</p>

        <div id="game-area" class="d-flex flex-wrap justify-content-center align-items-center" style="gap: 20px; max-width: 500px;">
            <div class="gift-box" onclick="checkGift(this)">🎁</div>
            <div class="gift-box" onclick="checkGift(this)">🎁</div>
            <div class="gift-box" onclick="checkGift(this)">🎁</div>
            <div class="gift-box" onclick="checkGift(this)">🎁</div>
            <div class="gift-box" onclick="checkGift(this)">🎁</div>
        </div>
    </div>

    <!-- 胜利界面 -->
    <div id="victory-overlay">
        <h1 class="display-1">🎂</h1>
        <h2 class="text-danger fw-bold mt-3">生日快乐！</h2>
        <p class="lead mt-3 px-4 text-center">
            愿你新的一岁：<br>
            眼里有光，笑里坦荡。<br>
            所有的美好都如期而至！
        </p>
        <button class="btn btn-custom text-white mt-4" onclick="location.reload()">再玩一次</button>
        <a href="index.html" class="btn btn-outline-danger mt-3 d-block mx-auto" style="width: fit-content;">
            &larr; 返回首页
        </a>
    </div>

    <!-- 撒花特效库 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        // 1. 定义祝福语 (结合内江特色和通用祝福)
        const blessings = [
            '千万要快乐', 
            '千万要千万', 
            '千万要康宁', 
            '千万要幸福', 
            '千万要平安'
        ];

        // 2. 洗牌函数
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 3. 初始化变量
        let currentIndex = 0;
        const totalNeeded = 5;
        let revealedCount = 0;
        let shuffledBlessings = shuffleArray([...blessings]);

        // 4. 拆礼物主函数
        function checkGift(element) {
            if (revealedCount >= totalNeeded) return;

            // 播放震动
            element.classList.add('shake-anim');

            // 获取当前祝福
            const currentBlessing = shuffledBlessings[currentIndex];

            setTimeout(() => {
                element.innerText = currentBlessing;
                element.classList.remove('shake-anim');
                element.classList.add('opened'); // 添加打开后的样式
                element.onclick = null; 
                
                currentIndex++;
                revealedCount++;

                // 检查是否完成
                if (revealedCount === totalNeeded) {
                    setTimeout(showVictory, 1500);
                }
            }, 250);
        }

        // 5. 显示胜利画面
        function showVictory() {
            document.getElementById('victory-overlay').style.display = 'flex';
            
            // 撒花特效 (红色系，更喜庆)
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#d63384', '#dc3545', '#0d6efd']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#d63384', '#dc3545', '#0d6efd']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
